name: Deploy to Production

# master 브랜치에 PR이 merge된 후 실행
# GitHub Environment "production" 에서 수동 승인 후 Node1에 배포
on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'ecosystem.config.cjs'
      - 'deployment/**'

jobs:
  deploy:
    name: Deploy to Node2 (worker1)
    runs-on: [self-hosted, node3]
    # ↓ GitHub Settings > Environments > "production" 에서 required reviewers 설정 필요
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Node2 via SSH
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            jcw@172.30.1.94 \
            "cd ~/my-blog && git pull origin master && bash deployment/redeploy.sh"

      - name: Notify deployment result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "::notice::배포 성공: $(git log -1 --pretty='%h %s')"
          else
            echo "::error::배포 실패 — Node2 서버 상태를 확인하세요"
          fi
