name: CI

# feature 브랜치 → master PR 시 자동 실행
# 또는 수동으로 GitHub Actions 탭에서 실행 가능
on:
  pull_request:
    branches: [master]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'ecosystem.config.cjs'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  # ────────────────────────────────────────────
  # 1. Web Page Tests (Playwright, 실제 서버 기동)
  # ────────────────────────────────────────────
  web-page-tests:
    name: Web Page Tests (Playwright)
    runs-on: [self-hosted, node3]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          # Pause unattended upgrades during CI to avoid apt lock conflicts
          sudo systemctl stop unattended-upgrades 2>/dev/null || true

          cd backend && npm ci
          cd ../frontend && npm ci

      - name: Install Playwright browsers and dependencies
        run: |
          npx playwright install chromium
          npx playwright install-deps chromium

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start test backend
        working-directory: backend
        env:
          NODE_ENV: test
          PORT: 3001
          DB_HOST: ${{ secrets.TEST_DB_HOST }}
          DB_PORT: ${{ secrets.TEST_DB_PORT }}
          DB_NAME: ${{ secrets.TEST_DB_NAME }}
          DB_USER: ${{ secrets.TEST_DB_USER }}
          DB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
          DB_SCHEMA: test_blog
          SESSION_SECRET: ${{ secrets.TEST_SESSION_SECRET }}
          FRONTEND_URL: http://localhost:4322
        run: |
          node app.js &
          echo "BACKEND_PID=$!" >> $GITHUB_ENV

      - name: Start test frontend
        working-directory: frontend
        env:
          HOST: 127.0.0.1
          PORT: 4322
        run: |
          node dist/server/entry.mjs &
          echo "FRONTEND_PID=$!" >> $GITHUB_ENV

      - name: Wait for servers to be ready
        run: |
          for i in $(seq 1 30); do
            BACKEND=$(curl -sf http://localhost:3001/api/ > /dev/null 2>&1 && echo ok || echo "")
            FRONTEND=$(curl -sf http://localhost:4322 > /dev/null 2>&1 && echo ok || echo "")
            if [ "$BACKEND" = "ok" ] && [ "$FRONTEND" = "ok" ]; then
              echo "Both servers ready after ${i}s"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "ERROR: Servers failed to start within 60s"
          exit 1

      - name: Setup nginx as reverse proxy
        run: |
          sudo apt-get install -y nginx

          # Create nginx config
          sudo tee /etc/nginx/sites-available/test-blog > /dev/null << 'NGINX_EOF'
          upstream backend {
              server localhost:3001;
          }

          upstream frontend {
              server localhost:4322;
          }

          server {
              listen 80;
              server_name localhost 127.0.0.1;

              # Frontend
              location / {
                  proxy_pass http://frontend;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_cache_bypass $http_upgrade;
              }

              # API
              location /api/ {
                  proxy_pass http://backend;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_cache_bypass $http_upgrade;
              }
          }
          NGINX_EOF

          # Enable site
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo ln -sf /etc/nginx/sites-available/test-blog /etc/nginx/sites-enabled/test-blog

          # Test and start nginx
          sudo nginx -t
          sudo systemctl start nginx

          # Wait for nginx to be ready
          for i in $(seq 1 10); do
            if curl -sf http://localhost/ > /dev/null 2>&1; then
              echo "Nginx ready after ${i}s"
              exit 0
            fi
            echo "Waiting for nginx... ($i/10)"
            sleep 1
          done
          echo "Nginx ready"

      - name: Backup test database (posts, projects tables)
        env:
          DB_HOST: ${{ secrets.TEST_DB_HOST }}
          DB_PORT: ${{ secrets.TEST_DB_PORT }}
          DB_NAME: ${{ secrets.TEST_DB_NAME }}
          DB_USER: ${{ secrets.TEST_DB_USER }}
          DB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
          DB_SCHEMA: test_blog
        run: |
          chmod +x backend/scripts/backup-test-db.sh
          bash backend/scripts/backup-test-db.sh

      - name: Run Playwright web page tests (via nginx)
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost
        run: npm run test:e2e

      - name: Setup ngrok for manual testing
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
        run: |
          # unzip이 없으면 설치
          which unzip > /dev/null || sudo apt-get install -y unzip

          # ARM64용 ngrok 다운로드
          wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-arm64.zip
          unzip -q ngrok-v3-stable-linux-arm64.zip
          chmod +x ngrok

          # authtoken 설정
          if [ -z "$NGROK_AUTHTOKEN" ]; then
            echo "⚠️  NGROK_AUTHTOKEN not set - ngrok will fail"
            echo "Please add NGROK_AUTHTOKEN to GitHub Secrets"
            echo "Get token: https://dashboard.ngrok.com/get-started/your-authtoken"
          else
            ./ngrok config add-authtoken "$NGROK_AUTHTOKEN"
          fi

          # ngrok 실행 (백그라운드)
          ./ngrok http 80 --log=stdout > /tmp/ngrok.log 2>&1 &
          NGROK_PID=$!
          echo "NGROK_PID=$NGROK_PID" >> $GITHUB_ENV
          echo "✅ ngrok started with PID: $NGROK_PID"

          # 초기 로그 확인
          sleep 3
          echo "📋 ngrok logs:"
          head -30 /tmp/ngrok.log || echo "No log file"

          # ngrok이 시작될 때까지 대기 (최대 20초)
          for i in $(seq 1 20); do
            echo "⏳ Checking ngrok... ($i/20)"

            # ngrok 프로세스 확인
            if ! ps -p $NGROK_PID > /dev/null 2>&1; then
              echo "❌ ngrok process died"
              tail -20 /tmp/ngrok.log
              break
            fi

            # API 확인
            if curl -sf http://localhost:4040/api/tunnels > /dev/null 2>&1; then
              echo "✅ ngrok API ready!"
              break
            fi
            sleep 1
          done

          echo ""
          echo "📋 Getting ngrok URL..."
          RESPONSE=$(curl -s http://localhost:4040/api/tunnels 2>&1)
          echo "$RESPONSE" | head -30
          echo ""

          # URL 추출
          NGROK_URL=$(echo "$RESPONSE" | grep -o 'https://[^"]*' | head -1)

          if [ -z "$NGROK_URL" ]; then
            echo "❌ Failed to get URL"
            cat /tmp/ngrok.log
            NGROK_URL="http://localhost (manual testing not available)"
          fi

          echo "NGROK_URL=$NGROK_URL" >> $GITHUB_ENV
          echo "✅ URL: $NGROK_URL"

      - name: Wait for manual testing verification
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════════╗"
          echo "║                                                                  ║"
          echo "║  ✅ 테스트 서버가 준비되었습니다!                               ║"
          echo "║                                                                  ║"
          echo "║  🌐 데스크톱에서 접속:                                          ║"
          echo "║  ${{ env.NGROK_URL }}/blog"
          echo "║                                                                  ║"
          echo "║  📋 확인 사항:                                                  ║"
          echo "║  □ 페이지 1에 10개의 포스트 표시                               ║"
          echo "║  □ 페이지 2 버튼 클릭 후 5개의 포스트 표시                    ║"
          echo "║  □ 이전/다음 버튼 정상 작동                                   ║"
          echo "║  □ 페이지 번호가 올바르게 표시                                ║"
          echo "║                                                                  ║"
          echo "║  ⏱️  10분 동안 서버가 유지됩니다.                              ║"
          echo "║     확인 후 CI가 자동 계속 진행됩니다.                        ║"
          echo "║                                                                  ║"
          echo "╚══════════════════════════════════════════════════════════════════╝"
          echo ""

          # 10분 대기
          sleep 600

      - name: Restore test database (posts, projects tables)
        if: always()
        env:
          DB_HOST: ${{ secrets.TEST_DB_HOST }}
          DB_PORT: ${{ secrets.TEST_DB_PORT }}
          DB_NAME: ${{ secrets.TEST_DB_NAME }}
          DB_USER: ${{ secrets.TEST_DB_USER }}
          DB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
          DB_SCHEMA: test_blog
        run: |
          chmod +x backend/scripts/restore-test-db.sh
          bash backend/scripts/restore-test-db.sh

      - name: Stop test servers, nginx, and ngrok
        if: always()
        run: |
          kill $BACKEND_PID $FRONTEND_PID 2>/dev/null || true
          kill $NGROK_PID 2>/dev/null || true
          sudo systemctl stop nginx 2>/dev/null || true
          echo "All services stopped"

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: frontend/playwright-report/
          retention-days: 7
