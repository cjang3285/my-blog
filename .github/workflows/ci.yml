name: CI

# feature 브랜치 → master PR 시 자동 실행
on:
  pull_request:
    branches: [master]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'ecosystem.config.cjs'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  # ────────────────────────────────────────────
  # 0. 린트
  # ────────────────────────────────────────────
  lint:
    name: Lint Code
    runs-on: [self-hosted, node3]
    steps:
      - uses: actions/checkout@v4

      - name: Backend - lint
        working-directory: backend
        run: |
          npm ci
          npm run lint || echo "lint script not found, skipping"

      - name: Frontend - lint
        working-directory: frontend
        run: |
          npm ci
          npm run lint || echo "lint script not found, skipping"

  # ────────────────────────────────────────────
  # 1. 인프라 파일 문법 검사
  # ────────────────────────────────────────────
  check-infra:
    name: Infrastructure Syntax Check
    runs-on: [self-hosted, node3]
    if: |
      contains(github.event.pull_request.title, '[infra]') ||
      true
    steps:
      - uses: actions/checkout@v4

      - name: Shell script syntax check
        run: bash -n deployment/redeploy.sh

      - name: Nginx config syntax check
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q 'nginx'; then
            nginx -t -c $(pwd)/deployment/nginx-blog.conf \
              && echo "nginx config OK" \
              || echo "::warning::nginx config check failed — manual review required"
          else
            echo "nginx config unchanged, skipping"
          fi
