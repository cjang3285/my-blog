name: CI

# feature 브랜치 → master PR 시 자동 실행
on:
  pull_request:
    branches: [master]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'ecosystem.config.cjs'
      - '.github/workflows/ci.yml'

jobs:
  # ────────────────────────────────────────────
  # 0. 린트
  # ────────────────────────────────────────────
  lint:
    name: Lint Code
    runs-on: [self-hosted, node3]
    steps:
      - uses: actions/checkout@v4

      - name: Backend - lint
        working-directory: backend
        run: |
          npm ci
          npm run lint || echo "lint script not found, skipping"

      - name: Frontend - lint
        working-directory: frontend
        run: |
          npm ci
          npm run lint || echo "lint script not found, skipping"

  # ────────────────────────────────────────────
  # 1. 단위 테스트 (DB 불필요)
  # ────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    needs: lint
    if: false
    runs-on: [self-hosted, node3]
    steps:
      - uses: actions/checkout@v4

      - name: Backend - install & unit test
        working-directory: backend
        run: |
          npm ci
          npm test

      - name: Frontend - install & unit test
        working-directory: frontend
        run: |
          npm ci
          npm test -- --run

  # ────────────────────────────────────────────
  # 2. 통합 테스트 (test DB 쿼리 검증 + DB 복원)
  # ────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    needs: lint
    if: false
    runs-on: [self-hosted, node3]
    steps:
      - uses: actions/checkout@v4

      - name: Backend - install & integration test
        working-directory: backend
        env:
          TEST_DB_HOST: ${{ secrets.TEST_DB_HOST }}
          TEST_DB_PORT: ${{ secrets.TEST_DB_PORT }}
          TEST_DB_NAME: ${{ secrets.TEST_DB_NAME }}
          TEST_DB_USER: ${{ secrets.TEST_DB_USER }}
          TEST_DB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
        run: |
          npm ci
          npm run test:integration

  # ────────────────────────────────────────────
  # 3. E2E 테스트 (Playwright, 실제 서버 기동)
  # ────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (Playwright)
    needs: integration-tests
    if: false
    runs-on: [self-hosted, node3]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          cd backend && npm ci
          cd ../frontend && npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start test backend
        working-directory: backend
        env:
          NODE_ENV: test
          PORT: 3001
          DB_HOST: ${{ secrets.TEST_DB_HOST }}
          DB_PORT: ${{ secrets.TEST_DB_PORT }}
          DB_NAME: ${{ secrets.TEST_DB_NAME }}
          DB_USER: ${{ secrets.TEST_DB_USER }}
          DB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
          DB_SCHEMA: test_blog
          SESSION_SECRET: ${{ secrets.TEST_SESSION_SECRET }}
          FRONTEND_URL: http://localhost:4322
        run: |
          node app.js &
          echo "BACKEND_PID=$!" >> $GITHUB_ENV

      - name: Start test frontend
        working-directory: frontend
        env:
          HOST: 127.0.0.1
          PORT: 4322
        run: |
          node dist/server/entry.mjs &
          echo "FRONTEND_PID=$!" >> $GITHUB_ENV

      - name: Wait for servers to be ready
        run: |
          for i in $(seq 1 30); do
            BACKEND=$(curl -sf http://localhost:3001/api/ && echo ok || echo "")
            FRONTEND=$(curl -sf http://localhost:4322 && echo ok || echo "")
            if [ "$BACKEND" = "ok" ] && [ "$FRONTEND" = "ok" ]; then
              echo "Both servers ready after ${i}s"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "ERROR: Servers failed to start within 60s"
          exit 1

      - name: Run Playwright E2E tests
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4322
        run: npm run test:e2e

      - name: Stop test servers
        if: always()
        run: kill $BACKEND_PID $FRONTEND_PID 2>/dev/null || true

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: frontend/playwright-report/
          retention-days: 7

  # ────────────────────────────────────────────
  # 4. 인프라 파일 문법 검사
  # ────────────────────────────────────────────
  check-infra:
    name: Infrastructure Syntax Check
    runs-on: [self-hosted, node3]
    if: |
      contains(github.event.pull_request.title, '[infra]') ||
      true
    steps:
      - uses: actions/checkout@v4

      - name: Shell script syntax check
        run: bash -n deployment/redeploy.sh

      - name: Nginx config syntax check
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q 'nginx'; then
            nginx -t -c $(pwd)/deployment/nginx-blog.conf \
              && echo "nginx config OK" \
              || echo "::warning::nginx config check failed — manual review required"
          else
            echo "nginx config unchanged, skipping"
          fi
